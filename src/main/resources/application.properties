server.port=8092

#config base datos
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.url=jdbc:mysql://localhost:3306/db_springboot_dev?allowPublicKeyRetrieval=true&useSSL=false
#NUEVAS PARA MAKEMIGRATIONS AUTOMATICO
#create: Crea las tablas en cada inicio (BORRA los datos anteriores).
#update: Modifica la base de datos sin borrar datos existentes.
#validate: Solo verifica si la estructura de la base coincide con los modelos.
#none: No hace nada.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#config hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

#config api swagger
springdoc.swagger-ui.path=/swagger-ui-custom.html

#activar los log de hibernate
#spring.jpa.show-sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#para jackson serializa los JSON
#spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

logging.level.org.springframework.web=DEBUG

