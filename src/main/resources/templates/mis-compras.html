<!-- mis-compras.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Historial de compras - FashionStore">
    <title>Mis Compras</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .navbar { background-color: black; }
        .navbar-brand, .nav-link { color: white !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">FashionStore</a>
    </div>
</nav>
<div class="container mt-4">
    <h2 class="text-center">Mis Compras</h2>
    <table class="table table-hover">
        <thead>
        <tr>
            <th>Fecha</th>
            <th>Productos</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="compra : ${compras}">
            <td th:text="${compra.fecha}"></td>
            <td>
                <ul>
                    <li th:each="item : ${compra.items}" th:text="|${item.producto.nombre} (x${item.cantidad})|"></li>
                </ul>
            </td>
            <td th:text="${compra.total}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
