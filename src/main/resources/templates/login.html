<!-- login.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tienda de moda online - FashionStore">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background-color: black; }
    .navbar-brand, .nav-link { color: white !important; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">FashionStore</a>
  </div>
</nav>
<div class="container d-flex align-items-center justify-content-center vh-100">
  <div class="text-center bg-white p-5 shadow rounded">
    <h2>Bienvenido</h2>
    <p>Ingrese su correo para continuar</p>
    <form th:action="@{/login}" method="post">
      <input type="email" name="correo" class="form-control mb-3" placeholder="Correo electrónico" required>
      <button type="submit" class="btn btn-dark">Iniciar Sesión</button>
    </form>
  </div>
</div>
</body>
</html>
