<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explora nuestra colección exclusiva de moda">
  <title>Productos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .navbar { background-color: black; }
    .navbar-brand, .nav-link { color: white !important; }
    .card { border: none; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">FashionStore</a>
  </div>
</nav>
<div class="container mt-4">
  <h2 class="text-center mb-4">Colección Exclusiva</h2>
  <div class="row">
    <div class="col-md-4" th:each="producto : ${productos}">
      <div class="card">
        <img th:src="${producto.imagenUrl}" class="card-img-top" alt="Imagen del producto">
        <div class="card-body text-center">
          <h5 class="card-title" th:text="${producto.nombre}"></h5>
          <p class="text-muted" th:text="${producto.descripcion}"></p>
          <p class="fw-bold">$<span th:text="${producto.precio}"></span></p>
          <form th:action="@{/carrito/agregar}" method="post">
            <input type="hidden" name="idProducto" th:value="${producto.id}">
            <button type="submit" class="btn btn-dark">Añadir al carrito</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
