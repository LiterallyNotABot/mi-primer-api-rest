<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Revisa y gestiona tu carrito de compras">
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .navbar { background-color: black; }
    .navbar-brand, .nav-link { color: white !important; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">FashionStore</a>
  </div>
</nav>
<div class="container mt-4">
  <h2 class="text-center">Tu Carrito</h2>
  <table class="table table-hover">
    <thead>
    <tr>
      <th>Producto</th>
      <th>Precio</th>
      <th>Cantidad</th>
      <th>Subtotal</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${itemsCarrito}">
      <td th:text="${item.producto.nombre}"></td>
      <td th:text="${item.producto.precio}"></td>
      <td th:text="${item.cantidad}"></td>
      <td th:text="${item.subtotal}"></td>
      <td>
        <form th:action="@{/carrito/eliminar}" method="post">
          <input type="hidden" name="idItem" th:value="${item.id}">
          <button type="submit" class="btn btn-danger">Eliminar</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
  <div class="text-end">
    <h4>Total: $<span th:text="${total}"></span></h4>
    <button class="btn btn-dark">Finalizar Compra</button>
  </div>
</div>
</body>
</html>
